<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="template:media-width" content="1024">
    <meta name="template:media-height" content="1792">
    <style>
        html, body {
            margin: 0;
            padding: 0;
        }

        body {
            width: 1080px;
            height: 1920px;
            font-family: 'PingFang SC', 'Source Han Sans', 'Microsoft YaHei', sans-serif;
            position: relative;
            overflow: hidden;
            background: #000;
        }

        /* AI-generated image fills the whole frame */
        .bg-image {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* Bottom gradient so subtitle reads on bright images */
        .gradient-overlay {
            position: absolute;
            left: 0;
            right: 0;
            bottom: 0;
            height: 700px;
            background: linear-gradient(
                to bottom,
                rgba(0,0,0,0.0) 0%,
                rgba(0,0,0,0.55) 100%
            );
            pointer-events: none;
        }

        .subtitle-wrap {
            position: absolute;
            bottom: {{subtitle_bottom:number=220}}px;
            left: 60px;
            right: 60px;
            text-align: center;
        }

        .subtitle {
            color: #fff;
            font-size: {{subtitle_size:number=68}}px;
            font-weight: 700;
            line-height: 1.45;
            letter-spacing: 2px;
            text-shadow:
                -3px -3px 0 #000, 3px -3px 0 #000,
                -3px  3px 0 #000, 3px  3px 0 #000,
                0 0 24px rgba(0,0,0,0.6);
        }

        /* Optional keyword highlight: wrap a word in
           <span class="highlight">…</span> inside {{text}} to emphasize it.
           LLM-generated text is plain by default, so this stays unused
           unless the prompt explicitly asks for highlighted keywords. */
        .subtitle .highlight {
            color: {{highlight_color:color=#ffd166}};
        }
    </style>
</head>
<body>
    <img class="bg-image" src="{{image}}" alt="AI Image">
    <div class="gradient-overlay"></div>

    <div class="subtitle-wrap">
        <div class="subtitle">{{text}}</div>
    </div>
</body>
</html>
