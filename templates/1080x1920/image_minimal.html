<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="template:media-width" content="1024">
    <meta name="template:media-height" content="1792">
    <style>
        html, body {
            margin: 0;
            padding: 0;
        }

        body {
            width: 1080px;
            height: 1920px;
            font-family: 'PingFang SC', 'Source Han Sans', 'Microsoft YaHei', sans-serif;
            position: relative;
            overflow: hidden;
            background: #000;
        }

        /* AI-generated image fills the whole frame */
        .bg-image {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* Bottom gradient so subtitle reads on bright images */
        .gradient-overlay {
            position: absolute;
            left: 0;
            right: 0;
            bottom: 0;
            height: 700px;
            background: linear-gradient(
                to bottom,
                rgba(0,0,0,0.0) 0%,
                rgba(0,0,0,0.55) 100%
            );
            pointer-events: none;
        }

        .subtitle-wrap {
            position: absolute;
            bottom: 220px;
            left: 0;
            right: 0;
            display: flex;
            justify-content: center;
            padding: 0 40px;
            box-sizing: border-box;
        }

        /* 限制宽度 + 中文不断词，促使均衡折成约两行（参考 blur_card 底部字幕布局） */
        .subtitle {
            color: #fff;
            font-size: 44px;
            font-weight: 500;
            line-height: 1.6;
            letter-spacing: 0.5px;
            text-align: center;
            margin: 0;
            width: 100%;
            max-width: 24em;
            word-break: keep-all;
            text-wrap: balance;
            text-shadow:
                2px 2px 4px rgba(0, 0, 0, 0.9),
                0 0 8px rgba(0, 0, 0, 0.8),
                0 0 16px rgba(0, 0, 0, 0.6);
        }

        /* Optional keyword highlight: wrap a word in
           <span class="highlight">…</span> inside {{text}} to emphasize it.
           LLM-generated text is plain by default, so this stays unused
           unless the prompt explicitly asks for highlighted keywords. */
        .subtitle .highlight {
            color: #ffd166;
        }
    </style>
</head>
<body>
    <img class="bg-image" src="{{image}}" alt="AI Image">
    <div class="gradient-overlay"></div>

    <div class="subtitle-wrap">
        <div class="subtitle">{{text}}</div>
    </div>
</body>
</html>
